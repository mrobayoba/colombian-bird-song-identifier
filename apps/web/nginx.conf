# nginx config for the Cantos web frontend container.
# - Serves the built SPA, falling back to index.html for client-side routes.
# - Proxies /api/* to the Bird Index Agent so the browser stays same-origin
#   (no CORS needed in the containerized setup).
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Static assets + SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Forward API calls to the index agent service on the compose network.
    # "index-agent" is the service name in docker-compose; Docker DNS resolves it.
    location /api/ {
        proxy_pass http://index-agent:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Audio uploads can be a few MB; raise the limit.
        client_max_body_size 20m;
        proxy_read_timeout 60s;
    }

    # Health passthrough (optional convenience).
    location = /health {
        proxy_pass http://index-agent:8000/health;
    }
}
